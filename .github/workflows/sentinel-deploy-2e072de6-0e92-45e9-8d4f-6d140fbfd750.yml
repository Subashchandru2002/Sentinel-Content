name: Deploy Content to testworkspace1 [2e072de6-0e92-45e9-8d4f-6d140fbfd750]
# Note: This workflow will deploy everything in the root directory.
# To deploy content only from a specific path (for example SentinelContent):
#   1. Add the target path to the "paths" property like such
#    paths:
#    - 'SentinelContent/**'
#    - '!.github/workflows/**'
#    - '.github/workflows/sentinel-deploy-2e072de6-0e92-45e9-8d4f-6d140fbfd750.yml'
#   2. Append the path to the directory environment variable below
#       directory: '${{ github.workspace }}/SentinelContent'

on:
  push:
    branches: [ main ]
    paths:
    - '**'
    - '!.github/workflows/**'  # this filter prevents other workflow changes from triggering this workflow
    - '.github/workflows/sentinel-deploy-2e072de6-0e92-45e9-8d4f-6d140fbfd750.yml'

jobs:
  deploy-content:
    runs-on: windows-latest
    env:
      resourceGroupName: 'testresource1-subash'
      workspaceName: 'testworkspace1'
      workspaceId: 'd59a84a8-4ea6-4c18-b5aa-6e5e66150392'
      directory: '${{ github.workspace }}'
      cloudEnv: 'AzureCloud'
      contentTypes: 'Playbook,Parser'
      branch: 'main'
      sourceControlId: '2e072de6-0e92-45e9-8d4f-6d140fbfd750'
      rootDirectory: '${{ github.workspace }}'
      githubAuthToken: ${{ secrets.GITHUB_TOKEN }}
      smartDeployment: 'true'
    permissions:
      contents: write
      id-token: write # Require write permission to Fetch an OIDC token.

    steps:
    - name: Login to Azure (Attempt 1)
      continue-on-error: true
      id: login1
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_2e072de60e9245e98d4f6d140fbfd750 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_2e072de60e9245e98d4f6d140fbfd750 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_2e072de60e9245e98d4f6d140fbfd750 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 1 failed
      if: ${{ steps.login1.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 2)
      continue-on-error: true
      id: login2
      uses: azure/login@v2
      if: ${{ steps.login1.outcome=='failure' }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_2e072de60e9245e98d4f6d140fbfd750 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_2e072de60e9245e98d4f6d140fbfd750 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_2e072de60e9245e98d4f6d140fbfd750 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Wait 30 seconds if login attempt 2 failed
      if: ${{ steps.login2.outcome=='failure' }}
      run: powershell Start-Sleep -s 30

    - name: Login to Azure (Attempt 3)
      continue-on-error: false
      id: login3
      uses: azure/login@v2
      if: ${{ steps.login2.outcome=='failure'  }}
      with:
        client-id: ${{ secrets.AZURE_SENTINEL_CLIENTID_2e072de60e9245e98d4f6d140fbfd750 }}
        tenant-id: ${{ secrets.AZURE_SENTINEL_TENANTID_2e072de60e9245e98d4f6d140fbfd750 }}
        subscription-id: ${{ secrets.AZURE_SENTINEL_SUBSCRIPTIONID_2e072de60e9245e98d4f6d140fbfd750 }}
        environment: 'AzureCloud'
        audience: api://AzureADTokenExchange
        enable-AzPSSession: true

    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy Content to Microsoft Sentinel
      uses: azure/powershell@v2
      with:
        azPSVersion: 'latest'
        inlineScript: |
          ${{ github.workspace }}//.github/workflows/azure-sentinel-deploy-2e072de6-0e92-45e9-8d4f-6d140fbfd750.ps1